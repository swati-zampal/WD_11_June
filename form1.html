<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <form action="chessboard.html">
        <fieldset>
            <legend>Registration Form</legend>
        <label>Name: </label>
        <input type="text" placeholder="Enter your name">
        <br><br>
         <label>Email: </label>
        <input type="email" placeholder="Enter your email">
         <br><br>
         <label>contact: </label>
        <input type="tel" placeholder="Enter your contact no">
         <br><br>
         <label>Password: </label>
        <input type="text" placeholder="set your password">
         <br><br>
         <label>Address: </label>
         <textarea cols="50" rows="10"> </textarea>
         <br><br>
         <!-- Radio buttons-->
         <label>Gender: </label>
         <input type="radio" id="gender" name="gen1">Male
         <input type="radio" id="gender" name="gen1">Female
         <br><br>
         <!-- Checkbox-->
          <label>Course:</label>
          <input type="checkbox">Web designing
          <input type="checkbox">SQL
          <input type="checkbox">C 
          <input type="checkbox">Java
          <input type="checkbox">Testing
        <br><br>
        <!--Drop Down list-->
        <label> Branch</label>
        <select>
            <option>Select Branch</option>
            <option>Hadapsar</option>
            <option>Shivaji Nagar</option>
            <option>PCMC</option>
        </select>
        <br><br>
        <button type="submit" value="Register">Register</button>

      </fieldset>  
    </form>
</body>
</html>
